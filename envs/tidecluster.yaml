# Shared "main" computational env: DANTE_LTR, the R/report stack, and
# RepeatMasker. Used by ~19 rules (dante_ltr, library construction,
# repeatmasker, and all the R bigwig/summary/report rules).
#
# NOTE: neither TideCluster nor the bare DANTE (`dante`) tool is here.
#   * TideCluster >=1.15 needs r-base >=4.2 (via r-igraph 2.0.3); the TideCluster
#     rules use envs/tidecluster_run.yaml.
#   * DANTE moved to r-base 4.2.3 in 0.2.11, while dante_ltr 0.5.2.0 still pins
#     r-dplyr 1.0.7 (r-base <4.2) — so the two can no longer share an env and
#     DANTE split out to envs/dante.yaml. This env is pinned to r-base 4.1 by
#     dante_ltr.
# The file name is kept for minimal churn even though it no longer ships
# TideCluster or DANTE.
#
# repeatmasker is pinned explicitly: it used to be pulled in transitively via
# the tidecluster package, so removing TideCluster from this env would
# otherwise silently drop RepeatMasker (4.1.2.p1) that the `repeatmasker` and
# `dante_ltr` rules depend on.
name: tidecluster
channels:
  - conda-forge
  - bioconda
  - petrnovak
dependencies:
  # dante_ltr 0.5.2.0 makes its library clustering deterministic (canonically
  # sorts TE_all.fasta before mmseqs easy-cluster), so the Ty1_copia/Angela
  # library no longer churns run-to-run — see
  # docs/dante_ltr_deterministic_clustering_request.md.
  - dante_ltr=0.5.2.0
  - repeatmasker=4.1.2.p1
  - seqkit=2.8.2
  - cap3=10.2011
  # CARP-added helper deps; r-jsonlite/r-yaml are the r-base 4.1 (r41) builds
  # this env resolves (now pinned by dante_ltr, formerly by DANTE).
  - r-jsonlite=1.8.5
  - r-yaml=2.3.7
  - pyyaml=6.0.3
  # jq here is belt-and-suspenders for the bioconductor-*data post-link scripts
  # (installBiocDataPackage.sh -> yq -> jq). The AUTHORITATIVE fix is the
  # system-level `apt-get install jq` in the Singularity %post, because conda
  # gives no ordering guarantee that this env-level jq links before
  # genomeinfodbdata's post-link runs. Keep both.
  - jq=1.8.2
