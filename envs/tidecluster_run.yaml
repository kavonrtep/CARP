# Dedicated env for the TideCluster rules (tidecluster_long, tidecluster_short,
# tidecluster_reannotate). Split out from envs/tidecluster.yaml because
# TideCluster >=1.15 needs r-base >=4.2 (via r-igraph 2.0.3) while DANTE pins
# r-base 4.1.3 — the two cannot coexist in one conda env.
#
# TideCluster 1.16.0 bundles TideHunter, mmseqs2, RepeatMasker (4.1.2.p1 — same
# version as the shared env), rtracklayer and optparse. 1.16.0 adds three
# behaviours the pipeline relies on, all default-on in `run_all`:
#   - rDNA identification: writes rDNA_type=45S|5S into the clustering GFF3
#     (consumed by make_unified_annotation.R -> array-level rDNA_45S/rDNA_5S);
#   - cross-TRC overlap resolution: clustering GFF3 made non-overlapping across
#     satellite TRCs (dominant-TRC-wins);
#   - chunked, pooled tc_reannotate RepeatMasker (replaces the ineffective
#     whole-genome -pa with a custom -lib on RMBlast; Dfam #274) — the
#     requested speedup, with the post-RM filter made sub-quadratic.
# The helper scripts the TideCluster rules call directly are declared explicitly
# so the env is self-documenting and robust to future dependency changes:
#   - calculate_density_batch.R -> bioconductor-rtracklayer, r-optparse
#   - reduce_dimer_library.py    -> mmseqs2
#
# 1.16.2 fixes the TRC-superfamily empty-fallback naming: the no-superfamily
# case now writes the canonical <prefix>_trc_superfamilies.csv (with header)
# instead of an unheadered 0-byte <prefix>_superfamilies.csv. That is the file
# scripts/tc_reannotate_sf_filter.py consumes for superfamily-aware array
# recovery (config tidecluster_reannotate_superfamily_merge).
name: tidecluster_run
channels:
  - conda-forge
  - bioconda
  - petrnovak
dependencies:
  - tidecluster=1.16.2
  - bioconductor-rtracklayer
  - r-optparse
  - mmseqs2
  - r-jsonlite
  - r-yaml
  - pyyaml
