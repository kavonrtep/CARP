# Dedicated env for the TideCluster rules (tidecluster_long, tidecluster_short,
# tidecluster_reannotate). Split out from envs/tidecluster.yaml because
# TideCluster >=1.15 needs r-base >=4.2 (via r-igraph 2.0.3) while DANTE pins
# r-base 4.1.3 — the two cannot coexist in one conda env.
#
# TideCluster 1.16.0 bundles TideHunter, mmseqs2, RepeatMasker (4.1.2.p1 — same
# version as the shared env), rtracklayer and optparse. 1.16.0 adds three
# behaviours the pipeline relies on, all default-on in `run_all`:
#   - rDNA identification: writes rDNA_type=45S|5S into the clustering GFF3
#     (consumed by make_unified_annotation.R -> array-level rDNA_45S/rDNA_5S);
#   - cross-TRC overlap resolution: clustering GFF3 made non-overlapping across
#     satellite TRCs (dominant-TRC-wins);
#   - chunked, pooled tc_reannotate RepeatMasker (replaces the ineffective
#     whole-genome -pa with a custom -lib on RMBlast; Dfam #274) — the
#     requested speedup, with the post-RM filter made sub-quadratic.
# The helper scripts the TideCluster rules call directly are declared explicitly
# so the env is self-documenting and robust to future dependency changes:
#   - calculate_density_batch.R -> bioconductor-rtracklayer, r-optparse
#   - reduce_dimer_library.py    -> mmseqs2
#
# 1.16.2 fixes the TRC-superfamily empty-fallback naming: the no-superfamily
# case now writes the canonical <prefix>_trc_superfamilies.csv (with header)
# instead of an unheadered 0-byte <prefix>_superfamilies.csv. That is the file
# scripts/tc_reannotate_sf_filter.py consumes for superfamily-aware array
# recovery (config tidecluster_reannotate_superfamily_merge).
#
# 1.16.3 fixes the tc_reannotate chunk-pool RepeatMasker library-build race that
# could silently truncate the reannotation on a fresh env's first run: the RM
# libraries are now built once before the pool fans out, and a failed chunk
# makes tc_reannotate exit non-zero instead of merging a partial set. See
# docs/tidecluster_reannotate_chunk_race_request.md.
#
# 1.17.0 makes the HTML report (<prefix>_report/) self-contained: it now vendors
# its per-TRC PNGs into <prefix>_report/img/ instead of referencing them via ../
# inside the TideCluster_kite / TideCluster_tarean working trees. That makes
# `cleanup_intermediates: maximal` (which purges those multi-GB trees) SAFE — the
# report survives the purge with no broken images. Verified end-to-end on the
# small fixture (0/9 report PNG refs missing after a maximal purge). See
# docs/tidecluster_self_contained_report_request.md.
#
# 1.18.0 is a large-genome performance / scalability update, verified
# byte-identical to 1.17.0 on the deterministic outputs (no behaviour, CLI
# or output change): TAREAN/rDNA use a random-access IndexedFasta reader
# instead of loading the whole genome into RAM (was OOMing large assemblies),
# O(1) TideHunter coordinate remap, linear duplicate-array filtering, and a
# memory-gated parallel per-part TideHunter. Purge-safety (self-contained
# report) reconfirmed end-to-end on the small fixture.
name: tidecluster_run
channels:
  - conda-forge
  - bioconda
  - petrnovak
dependencies:
  - tidecluster=1.18.0
  # CARP-added helper deps, pinned to the validated SIF build (release 1.0.7);
  # the r-* / bioconductor builds here are the r-base 4.3.3 (r43) set this env
  # resolves (TideCluster needs r-base >= 4.2).
  - bioconductor-rtracklayer=1.62.0
  - r-optparse=1.7.5
  - mmseqs2=16.747c6
  - r-jsonlite=2.0.0
  - r-yaml=2.3.10
  - pyyaml=6.0.3
  # jq here is belt-and-suspenders (bioconductor-rtracklayer pulls
  # bioconductor-genomeinfodbdata, whose post-link runs yq -> jq). The
  # AUTHORITATIVE fix is the system-level `apt-get install jq` in the Singularity
  # %post — conda gives no guarantee this env-level jq links before that
  # post-link runs. Keep both.
  - jq=1.8.2
