name: pipeline

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    # Sunday 03:00 UTC — regression signal even when no PRs land.
    - cron: '0 3 * * 0'
  workflow_dispatch:

concurrency:
  group: pipeline-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────────────────
  # 0. Cheap version-gate. Duplicates .github/workflows/version.yml's
  # parse step so this workflow is self-contained — same pattern release.yml
  # uses for unit tests. A broken version.py blocks the expensive matrix
  # runs in front of the conda-env build.
  # ─────────────────────────────────────────────────────────────────────
  version:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    defaults:
      run:
        shell: bash -el {0}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - name: Parse version.py
        run: |
          v=$(python -c "
          import sys
          sys.path.insert(0, '.')
          from version import __version__, parse_version
          parse_version(__version__)
          print(__version__)
          ")
          echo "Pipeline version: $v"

  # ─────────────────────────────────────────────────────────────────────
  # 1. Build all per-rule conda envs ONCE and populate the cache. Later
  # matrix runs restore this cache (read-only). Without this split, every
  # matrix cell solves all envs in parallel and exhausts the 60-min
  # timeout on a cold cache (observed ~45 min env solve + ~30 min
  # pipeline on 2 vCPU = timeout).
  # ─────────────────────────────────────────────────────────────────────
  envs:
    needs: version
    runs-on: ubuntu-latest
    timeout-minutes: 90
    defaults:
      run:
        shell: bash -el {0}
    steps:
      - uses: actions/checkout@v4

      - name: Free disk for conda envs
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /opt/hostedtoolcache/CodeQL || true
          df -h

      - uses: mamba-org/setup-micromamba@v2
        with:
          environment-name: carp-snakemake
          create-args: >-
            python=3.11
            snakemake>=9
            pyyaml
          condarc: |
            channels:
              - conda-forge
              - bioconda
            channel_priority: flexible
          cache-environment: true
          cache-downloads: true

      - name: Restore .snakemake/conda cache
        id: cache
        uses: actions/cache@v4
        with:
          path: .snakemake/conda
          # Include post-deploy scripts in the key so edits to them also
          # invalidate the cache (otherwise primed artefacts like the
          # RepeatMasker BLAST indices wouldn't refresh).
          key: snakemake-conda-${{ hashFiles('envs/*.yaml', 'envs/*.post-deploy.sh') }}

      - name: Build all pipeline conda envs (on cache miss)
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          # --conda-create-envs-only resolves the DAG and creates every
          # rule's conda env, then exits. Any valid config file works; we
          # use the smallest (micro) because the content doesn't matter.
          snakemake \
            --snakefile Snakefile \
            --configfile tests/fixtures/config_micro.yaml \
            --cores 4 \
            --use-conda \
            --conda-prefix "$PWD/.snakemake/conda" \
            --conda-frontend conda \
            --conda-create-envs-only

      - name: Prime RepeatMasker BLAST indices (belt-and-braces)
        # Run on cache hit AND cache miss. The script is idempotent
        # (already-indexed libs are skipped via the .nsq/.psq existence
        # check) so re-running on a fresh cache costs only a few
        # seconds, but unconditional execution heals a cache that was
        # saved with a partially-primed env — that's how the April 2026
        # scheduled-run regression slipped past the original guard.
        run: |
          for env in "$PWD"/.snakemake/conda/*/; do
            [[ -d "${env}share/RepeatMasker/Libraries" ]] || continue
            echo "Priming $env"
            CONDA_PREFIX="${env%/}" bash envs/tidecluster.post-deploy.sh
          done

  # ─────────────────────────────────────────────────────────────────────
  # 2. Run each fixture using the pre-built envs.
  # ─────────────────────────────────────────────────────────────────────
  fixture:
    needs: envs
    runs-on: ubuntu-latest
    # GHA runners have 2 vCPU; fixture runs with -t 2 to match. The
    # timeout is generous because many snakemake rules claim
    # `threads: workflow.cores` — with 2 vCPU the per-rule wall time
    # roughly doubles vs the 4-core local benchmark (~500 s → ~15–20
    # min per fixture, plus overhead).
    timeout-minutes: 75
    strategy:
      fail-fast: false
      matrix:
        fixture: [small, medium]
    defaults:
      run:
        shell: bash -el {0}
    steps:
      - uses: actions/checkout@v4

      - name: Free disk
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /opt/hostedtoolcache/CodeQL || true
          df -h

      - uses: mamba-org/setup-micromamba@v2
        with:
          environment-name: carp-snakemake
          create-args: >-
            python=3.11
            snakemake>=9
            pyyaml
          condarc: |
            channels:
              - conda-forge
              - bioconda
            channel_priority: flexible
          cache-environment: true
          cache-downloads: true

      - name: Restore .snakemake/conda cache (expected hit from envs job)
        uses: actions/cache/restore@v4
        with:
          path: .snakemake/conda
          # Include post-deploy scripts in the key so edits to them also
          # invalidate the cache (otherwise primed artefacts like the
          # RepeatMasker BLAST indices wouldn't refresh).
          key: snakemake-conda-${{ hashFiles('envs/*.yaml', 'envs/*.post-deploy.sh') }}
          fail-on-cache-miss: true

      - name: Prime RepeatMasker BLAST indices (belt-and-braces)
        # The envs job runs the same priming step, but a stale cache
        # restored here can still arrive un-primed (or primed for a
        # different env hash) — re-running on every fixture invocation
        # is cheap (idempotent: already-indexed libs are skipped) and
        # closes the gap that produced the April 2026 regression.
        run: |
          for env in "$PWD"/.snakemake/conda/*/; do
            [[ -d "${env}share/RepeatMasker/Libraries" ]] || continue
            echo "Priming $env"
            CONDA_PREFIX="${env%/}" bash envs/tidecluster.post-deploy.sh
          done

      - name: Run pipeline on ${{ matrix.fixture }} fixture
        # -t 2: match the runner's vCPU count. Oversubscribing (-t 4)
        # with rules declaring threads: workflow.cores trashes cache
        # locality on 2 vCPU and slows the whole pipeline.
        run: |
          python run_pipeline.py -c tests/fixtures/config_${{ matrix.fixture }}.yaml -t 2

      - name: Assert fixture outputs
        run: bash scripts/assert_fixture_outputs.sh ${{ matrix.fixture }}

      - name: Upload output on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: output_${{ matrix.fixture }}_${{ github.run_id }}
          path: tests/fixtures/output_${{ matrix.fixture }}
          retention-days: 7
          if-no-files-found: ignore
