genome_fasta: data/CEN6_ver_220406_part.fasta
output_dir: output_no_reduction
custom_library: data/pisum_custom_library.fasta
tandem_repeat_library: data/FabTR_all_sequences_210901.db.RM_format.fasta
# possible values are: rush, default, quick,
# if missing, default is used
repeatmasker_sensitivity: default
# possible values are: True, False, if missing, True is used
reduce_library: False
# DANTE_TIR_FALLBACK tuning (both default to 3 if omitted).
# dante_tir_fallback_min_alignments: how many other anchors must support an
#   extension length before it is applied (larger = more conservative extensions).
# dante_tir_fallback_min_cluster_size: minimum mmseqs cluster size whose
#   representative is kept in the fallback repeat library (larger = higher
#   multiplicity requirement for library entries).
dante_tir_fallback_min_alignments: 3
dante_tir_fallback_min_cluster_size: 3
# DANTE_TIR primary-element library filter. Default 3 matches the
# historical behaviour from before the DANTE_TIR_FALLBACK refactor (when
# the library was sourced from `all_representative_elements_min3.fasta`,
# which `dante_tir_summary.R` builds with `--min_cluster_size 3`). The
# value gates the `Multiplicity` attribute on each primary GFF parent:
# elements with `Multiplicity < threshold` are dropped from the library
# only — they remain visible in DANTE_TIR_combined.gff3 and the unified
# annotation. Lower to 1 to disable the filter.
dante_tir_min_multiplicity: 3
