genome_fasta: data/CEN6_ver_220406_part.fasta
output_dir: output_no_reduction
custom_library: data/pisum_custom_library.fasta
tandem_repeat_library: data/FabTR_all_sequences_210901.db.RM_format.fasta
# possible values are: rush, default, quick,
# if missing, default is used
repeatmasker_sensitivity: default
# rmblastn -culling_limit for the RepeatMasker step. 0 = off (default, behaviour
# unchanged). Caps redundant HSPs per genomic locus, which on a redundant de-novo
# library (each TE copy otherwise hits hundreds of near-identical consensi) makes
# RepeatMasker much faster. Measured through the real wrapper path on a Pisum-type
# genome: 2 -> ~3x faster at -0.7% masked bp (classification preserved); with
# repeatmasker_sensitivity: rush, ~7x at -1.8%. 2 is the recommended value; 1 is
# more aggressive (dropped ~3% masked bp in testing). Test on your data first.
repeatmasker_culling_limit: 0
# possible values are: True, False, if missing, True is used
reduce_library: False
# Rotation-invariant reduction of the TideCluster consensus dimer library used
# by the genome-wide tandem remasking (tidecluster_reannotate). Independent of
# reduce_library above. Default True: lossless for masking (validated) and makes
# the remasking ~1.5-5x faster by collapsing redundant phase variants per TRC.
# Set False to remask with the full (unreduced) dimer library.
reduce_tidecluster_library: True
# Second-round CONTAINMENT reduction of the RepeatMasker library (independent of
# reduce_library). After the per-class CAP3/mmseqs reduction, this drops short
# repeat fragments that are fully contained in a longer element of the SAME
# class; RepeatMasker masks their genomic copies via the container, so masking
# and classification are preserved. Validated masked-bp-lossless on the Pisum
# pangenome (~-22% library bp, ~-30% RepeatMasker wall-time). Default True; set
# False to feed RepeatMasker the full per-class-reduced library.
reduce_library_containment: True
# Thresholds for the containment pass above: a fragment is removed only if a
# longer same-class sequence covers at least containment_min_coverage of its
# length at >= containment_min_identity percent identity. 80 / 0.90 is the
# validated lossless default; raise for a more conservative reduction.
containment_min_identity: 80
containment_min_coverage: 0.90
# DANTE_TIR_FALLBACK tuning (both default to 3 if omitted).
# dante_tir_fallback_min_alignments: how many other anchors must support an
#   extension length before it is applied (larger = more conservative extensions).
# dante_tir_fallback_min_cluster_size: minimum mmseqs cluster size whose
#   representative is kept in the fallback repeat library (larger = higher
#   multiplicity requirement for library entries).
dante_tir_fallback_min_alignments: 3
dante_tir_fallback_min_cluster_size: 3
# DANTE_TIR primary-element library filter. Default 3 matches the
# historical behaviour from before the DANTE_TIR_FALLBACK refactor (when
# the library was sourced from `all_representative_elements_min3.fasta`,
# which `dante_tir_summary.R` builds with `--min_cluster_size 3`). The
# value gates the `Multiplicity` attribute on each primary GFF parent:
# elements with `Multiplicity < threshold` are dropped from the library
# only — they remain visible in DANTE_TIR_combined.gff3 and the unified
# annotation. Lower to 1 to disable the filter.
dante_tir_min_multiplicity: 3

# Optional inclusion of DANTE_TIR_FALLBACK reps in the RepeatMasker
# library. Default false to preserve historical behaviour byte-for-byte.
# When true, build_fallback_tir_library re-clusters the post-overlap
# fallback survivors, applies a Multiplicity floor, and runs a strict
# class-aware blastn filter against the LTR / DANTE_TIR primary / LINE
# / custom libraries. A fallback rep is dropped if any blast hit lands
# on a subject of incompatible classification — a CACTA fallback hit
# on an LTR-Copia or even a sibling hAT primary is dropped, only
# same-path / ancestor / descendant matches are kept. The kept reps
# are appended to combined_library.fasta. Audit log of all decisions
# is written to DANTE_TIR/fallback_library_dropped.tsv.
# The fallback library is intentionally NOT used to filter the LTR
# library (the fallback layer is treated as less reliable than the
# primary layer; a misclassified fallback must not damage the LTR
# annotation).
include_dante_tir_fallback_in_library: false
# Multiplicity floor applied to fallback cluster sizes when the flag
# above is true. Leave null to inherit dante_tir_min_multiplicity (3).
dante_tir_fallback_library_min_multiplicity: null

# ── TideCluster 1.16.0 options ───────────────────────────────────────────────
# rDNA identification: when true, TideCluster flags 45S/5S rDNA TRCs and the
# unified annotation labels them rDNA_45S / rDNA_5S (array-level) instead of a
# generic Satellite TRC. Set false to disable (--no_rdna).
tidecluster_detect_rdna: true
# Optional override for TideCluster's rDNA reference library. Empty = the bundled
# data/rdna_library.fasta (validated on the calibration array). Point at the
# pipeline's own data/rdna_library.fasta if the bundled set under-calls.
tidecluster_rdna_library: ""
# Cross-TRC overlap resolution: when false (default), TideCluster makes the
# clustering GFF3 non-overlapping across satellite TRCs (dominant-TRC-wins). Set
# true to keep the raw overlapping regions (--keep_overlaps).
tidecluster_keep_trc_overlaps: false
# Genome chunk size (bp) for the parallel, pooled RepeatMasker in tc_reannotate
# (the requested speedup). Sequences below 2x this are only packed
# (byte-identical); larger ones split with <0.15% masked-bp drift. Default 50 Mb.
tidecluster_chunk_size: 50000000
