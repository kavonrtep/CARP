genome_fasta: data/CEN6_ver_220406_part.fasta
output_dir: output
custom_library: data/pisum_custom_library.fasta
tandem_repeat_library: data/FabTR_all_sequences_210901.db.RM_format.fasta

# RepeatMasker sensitivity. One of: rush, default, quick. Defaults to default.
repeatmasker_sensitivity: default

# rmblastn -culling_limit for the RepeatMasker step. 0 = off (default; behaviour
# unchanged). N>0 caps the number of redundant HSPs kept per genomic locus.
# Rationale: a de-novo repeat library carries many near-identical consensi per
# family, so each genomic TE copy aligns to hundreds of them -> a per-locus HSP
# explosion (~800k HSPs / 3 Mb measured) that dominates rmblastn extension AND
# RepeatMasker's downstream overlap-filter/ProcessRepeats. culling discards an
# HSP whose query range is enveloped by >= N higher-scoring HSPs, collapsing that
# redundancy at search time (the best hit per locus is never culled, so masking
# and classification are preserved). It is, in effect, library reduction applied
# at search time -- useful when the library itself is hard to reduce further.
# Measured through the real repeatmasker_wrapper.py path on a Pisum-type genome:
#   2          -> ~3.0x faster RepeatMasker, -0.7% masked bp
#   2 + rush   -> ~7.5x faster,             -1.8% masked bp
#   1          -> slightly faster still but -3% masked bp (too aggressive)
# Recommended value 2. Injected via an RMBLAST_DIR shim in the wrapper, so no
# RepeatMasker/container patch is needed (works in the existing image). Validate
# on your own genome before making it the default.
repeatmasker_culling_limit: 0

# rmblastn -culling_limit for the TideCluster reannotation step
# (tidecluster_reannotate), independent of repeatmasker_culling_limit above.
# 0 = off (default). This is the strongest culling target in the pipeline: a
# consensus dimer aligns to a satellite array at every rotational phase, so a
# single locus accrues many overlapping HSPs that culling collapses. Measured on
# tiny_pea (same-machine A/B through the real tc_reannotate.py): culling 2 ->
# ~8x faster, -0.8% masked bp, shim confirmed on 1382 searches.
# CAUTION: tc_reannotate already risks under-masking LARGE satellite families
# (RepeatMasker needs the full consensus diversity to tile megasatellite arrays
# contiguously; cf. the reduce_tidecluster_library note). Culling collapses
# overlapping HSPs, which may worsen that on genomes with big satellites - so
# validate masked bp on such a genome before enabling. Same RMBLAST_DIR shim
# mechanism (no RepeatMasker/container patch). Recommended test value 2.
tidecluster_reannotate_culling_limit: 0

# Superfamily-aware array recovery for the RM-on-TideCluster reannotation
# (default True). tc_reannotate keeps an array only where a SINGLE TRC reaches
# the monomer-length threshold; when one real tandem array is tiled by >=2 TRCs
# of the same superfamily (common for short near-identical satellites) each
# per-TRC piece is sub-threshold and the array is lost -> a TE-derived tandem
# array is missed and the underlying TE prevails (culling only masks this by
# collapsing each locus to one TRC, making the result culling-dependent). When
# True the pipeline runs tc_reannotate --debug and re-filters its raw hits
# (scripts/tc_reannotate_sf_filter.py) grouping sibling TRCs by superfamily, so
# real arrays are recovered deterministically (independent of culling) while
# every feature keeps its bare TRC_<n> Name.
tidecluster_reannotate_superfamily_merge: True

# Tandem gate for the unified annotation (default True). A Tier-4 RM-on-
# TideCluster satellite may override a Tier-5 TE call only where it has
# independent tandem evidence (raw TideHunter); an unsupported RM_TC array (a
# short AT-rich consensus tiling a non-tandem TE such as a Tekay LTR-RT) is
# demoted below the TE, preventing spurious TE->satellite over-masking. RM_TC
# over non-TE sequence and genuine satellites are unaffected.
rm_tc_tandem_gate: True

# Library size reduction (mmseqs/cap3 dedup). True or False; default True.
reduce_library: True

# DANTE_TIR_FALLBACK extension stringency (defaults: 3 / 3).
dante_tir_fallback_min_alignments: 3
dante_tir_fallback_min_cluster_size: 3

# All-vs-all flank-alignment OOM guard (default 1000 each). When a TIR subtype
# (fallback) or the LINE pattern set has MORE anchors than this, the O(N^2)
# parasail all-vs-all is split into deterministic, mmseqs-clustering-based
# groups of at most this size and run per group — bounding peak memory on large
# genomes. At/below the threshold the result is byte-identical to no grouping.
# Must be >= 2. See docs/configuration.md.
dante_tir_fallback_max_group_size: 1000
dante_line_max_group_size: 1000

# DANTE_TIR primary-library Multiplicity floor (default 3).
# Drop primary elements with Multiplicity < threshold from the library.
# They stay in DANTE_TIR_combined.gff3 and the unified annotation.
dante_tir_min_multiplicity: 3

# Optional: promote DANTE_TIR_FALLBACK reps into the RepeatMasker library
# (default false — preserves historical behaviour). When true:
#   * fallback survivors are re-clustered with mmseqs;
#   * cluster reps with size >= dante_tir_fallback_library_min_multiplicity
#     are kept (null inherits dante_tir_min_multiplicity);
#   * a strict class-aware blastn filter (e-value 1e-19) drops any rep
#     whose hits include a default-library subject of incompatible
#     classification — siblings (CACTA vs hAT) count as incompatible,
#     only same-path or ancestor/descendant pairs survive.
# Audit log: DANTE_TIR/fallback_library_dropped.tsv.
# The fallback library is intentionally NOT used to filter the LTR
# library — see CLAUDE.md "DANTE_TIR Fallback Workflow" for rationale.
include_dante_tir_fallback_in_library: false
dante_tir_fallback_library_min_multiplicity: null
